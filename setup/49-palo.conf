# rsyslog — Palo Alto NGFW syslog receiver
#
# Listens on a DEDICATED UDP port (5140) so PAN-OS traffic never mixes with
# the VM's own system logs. Everything received on this port is written to
# /var/log/palo-alto.log, which palo_ingest.py tails into palo.duckdb.
#
# Install: sudo cp 49-palo.conf /etc/rsyslog.d/49-palo.conf && sudo systemctl restart rsyslog
#
# Why a named input + property match (instead of `$inputname == "imudp"`):
# rsyslog 8.2112's `inputname` property is only reliable when the input()
# block sets name=. Without it the conditional can silently never match and
# messages fall through to /var/log/syslog. Binding a name and matching on
# `inputname` makes the routing deterministic.

module(load="imudp")

# Named input so we can route on its exact name below.
input(type="imudp" port="5140" name="palo_imudp")

# Route everything received on the palo_imudp input to the PAN-OS log file
# and stop (don't also fall through into /var/log/syslog).
if $inputname == "palo_imudp" then {
    # Don't override fileOwner/fileGroup — rsyslog has already dropped
    # privileges to `syslog` by the time this runs, so it cannot chown a
    # file to `suricata`. The file is pre-created (mode 0666) by install.sh
    # so the syslog user can append to it; palo_ingest reads it as a member
    # of the `adm` group. omfile appends by default.
    action(type="omfile"
           file="/var/log/palo-alto.log"
           createDirs="on"
           fileCreateMode="0664"
           dirCreateMode="0755")
    stop
}
